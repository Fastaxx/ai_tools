        let activeCategory = "all";

        function renderFilters() {
            const filterRow = document.getElementById("filterRow");
            CATS.forEach((cat) => {
                const btn = document.createElement("button");
                btn.className = `filter-btn${activeCategory === cat.id ? " active" : ""}`;
                btn.textContent = cat.label;
                btn.onclick = () => filterByCategory(cat.id);
                filterRow.appendChild(btn);
            });

            const filtered = activeCategory === "all" ? agents : agents.filter((a) => a.category.includes(activeCategory));
            const countSpan = document.createElement("span");
            countSpan.className = "count-badge";
            countSpan.textContent = `${filtered.length} outil${filtered.length > 1 ? "s" : ""}`;
            filterRow.appendChild(countSpan);
        }

        function filterByCategory(category) {
            activeCategory = category;
            renderCards();
            updateFilters();
        }

        function updateFilters() {
            const buttons = document.querySelectorAll(".filter-btn");
            const filtered = activeCategory === "all" ? agents : agents.filter((a) => a.category.includes(activeCategory));
            
            buttons.forEach((btn, idx) => {
                btn.classList.toggle("active", CATS[idx].id === activeCategory);
            });

            const countSpan = document.querySelector(".count-badge");
            countSpan.textContent = `${filtered.length} outil${filtered.length > 1 ? "s" : ""}`;
        }

        function renderCards() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            const filtered = activeCategory === "all" ? agents : agents.filter((a) => a.category.includes(activeCategory));

            filtered.forEach((agent) => {
                const card = createCard(agent);
                grid.appendChild(card);
            });
        }

        function createCard(agent) {
            const card = document.createElement("div");
            card.className = "card";
            card.style.setProperty("--card-color-shadow", `${agent.color}22`);

            const stripe = document.createElement("div");
            stripe.className = "card-stripe";
            stripe.style.background = agent.color;
            card.appendChild(stripe);

            const body = document.createElement("div");
            body.className = "card-body";

            // Header
            const head = document.createElement("div");
            head.className = "card-head";

            const nameRow = document.createElement("div");
            nameRow.className = "name-row";

            const link = document.createElement("a");
            link.className = "agent-name";
            link.href = agent.url;
            link.target = "_blank";
            link.textContent = agent.name + " ↗";
            link.style.color = agent.color;
            nameRow.appendChild(link);

            const flag = document.createElement("span");
            flag.className = "flag";
            flag.textContent = agent.flag;
            nameRow.appendChild(flag);

            if (agent.badge) {
                const badge = document.createElement("span");
                badge.className = "badge";
                badge.textContent = agent.badge;
                badge.style.color = agent.badgeColor;
                badge.style.background = `${agent.badgeColor}14`;
                badge.style.borderColor = `${agent.badgeColor}40`;
                nameRow.appendChild(badge);
            }

            head.appendChild(nameRow);

            const maker = document.createElement("div");
            maker.className = "maker";
            maker.textContent = agent.maker;
            head.appendChild(maker);

            body.appendChild(head);

            // Tagline
            const tagline = document.createElement("div");
            tagline.className = "tagline";
            tagline.textContent = agent.tagline;
            body.appendChild(tagline);

            // Description
            const desc = document.createElement("p");
            desc.className = "desc";
            desc.textContent = agent.description;
            body.appendChild(desc);

            // Chips
            const chips = document.createElement("div");
            chips.className = "chips";
            agent.category.forEach((c) => {
                const chip = document.createElement("span");
                chip.className = "chip";
                chip.textContent = c;
                chip.style.color = agent.color;
                chip.style.borderColor = `${agent.color}50`;
                chips.appendChild(chip);
            });
            body.appendChild(chips);

            // Pricing
            const pricingBox = document.createElement("div");
            pricingBox.className = "pricing-box";

            pricingLabel.className = "section-label";
            pricingLabel.textContent = "Tarifs";
            pricingBox.appendChild(pricingLabel);

            agent.pricing.forEach((p) => {
                const row = document.createElement("div");
                row.className = "price-row";

                const planName = document.createElement("span");
                planName.className = "plan-name";
                planName.textContent = p.label;
                row.appendChild(planName);

                const planPrice = document.createElement("span");
                planPrice.className = "plan-price";
                planPrice.textContent = p.price;
                row.appendChild(planPrice);

                pricingBox.appendChild(row);
            });

            body.appendChild(pricingBox);

            // Toggle button
            const toggleBtn = document.createElement("button");
            toggleBtn.className = "toggle-btn";
            toggleBtn.style.color = agent.color;
            toggleBtn.style.borderColor = `${agent.color}40`;
            toggleBtn.textContent = "▼ Détails";
            toggleBtn.onclick = () => toggleExpand(agent.id, toggleBtn, expandWrap, agent.color);
            body.appendChild(toggleBtn);

            // Expanded content
            const expandWrap = document.createElement("div");
            expandWrap.className = "expand-wrap";

            const expandGrid = document.createElement("div");
            expandGrid.className = "expand-grid";

            // Features column
            const featuresCol = document.createElement("div");
            const featuresLabel = document.createElement("div");
            featuresLabel.className = "section-label";
            featuresLabel.textContent = "Fonctionnalités";
            featuresCol.appendChild(featuresLabel);

            agent.features.forEach((f) => {
                const item = document.createElement("div");
                item.className = "feature-item";

                const dot = document.createElement("span");
                dot.className = "dot";
                dot.style.background = agent.color;
                item.appendChild(dot);

                const txt = document.createElement("span");
                txt.className = "feature-txt";
                txt.textContent = f;
                item.appendChild(txt);

                featuresCol.appendChild(item);
            });

            expandGrid.appendChild(featuresCol);

            // Use cases column
            const useCasesCol = document.createElement("div");
            const useCasesLabel = document.createElement("div");
            useCasesLabel.className = "section-label";
            useCasesLabel.textContent = "Cas d'usage";
            useCasesCol.appendChild(useCasesLabel);

            agent.useCases.forEach((u) => {
                const item = document.createElement("div");
                item.className = "feature-item";

                const dot = document.createElement("span");
                dot.className = "dot";
                dot.style.background = agent.color;
                item.appendChild(dot);

                const txt = document.createElement("span");
                txt.className = "feature-txt";
                txt.textContent = u;
                item.appendChild(txt);

                useCasesCol.appendChild(item);
            });

            expandGrid.appendChild(useCasesCol);
            expandWrap.appendChild(expandGrid);

            // Visit button
            const visitBtn = document.createElement("a");
            visitBtn.className = "visit-btn";
            visitBtn.href = agent.url;
            visitBtn.target = "_blank";
            visitBtn.textContent = `Visiter ${agent.name} →`;
            visitBtn.style.background = agent.color;
            expandWrap.appendChild(visitBtn);

            body.appendChild(expandWrap);
            card.appendChild(body);

            return card;
        }

        function toggleExpand(agentId, btn, expandWrap, color) {
            if (expandedCard === agentId) {
                expandedCard = null;
                expandWrap.classList.remove("show");
                btn.textContent = "▼ Détails";
                btn.style.background = "transparent";
            } else {
                // Close previous
                const prevExpandWrap = document.querySelector(".expand-wrap.show");
                if (prevExpandWrap) {
                    prevExpandWrap.classList.remove("show");
                }

                expandedCard = agentId;
                expandWrap.classList.add("show");
                btn.textContent = "▲ Masquer";
                btn.style.background = `${color}0e`;
            }
        }

        // Initialize
        renderFilters();
        renderCards();
    </script>
</body>
</html>
